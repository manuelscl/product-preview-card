<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card | Frontend Mentor Challenge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            height: 100vh;
            background: hsl(30, 38%, 92%);
        }
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
        }
        .product-card-container {
            max-width: 375px;
            height: fit-content;
            display: flex;
            flex-direction: column;
            background: hsl(0, 0%, 100%);
            border-radius: 8px;
            overflow: hidden;
        }
        .product-card-image img {
            width: 100%;
        }
        .product-card-image img:nth-child(2) {
            display: none;
        }
        .product-content {
            padding: 20px;
        }
        .product-name {
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: 3px;
            color: hsl(228, 12%, 48%);
            text-transform: uppercase;
        }
        .product-title {
            font-size: 30px;
            font-family: 'Fraunces', serif;
            color: hsl(212, 21%, 14%);
            margin: 15px 0;
            padding-right: 15px;
        }
        .product-description {
            font-size: 14px;
            color:hsl(228, 12%, 48%);
            line-height: 24px;
            padding-right: 10px;
        }
        .prices {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .prices p:nth-child(1){
            font-size: 28px;
            font-weight: 700;
            font-family: 'Fraunces', serif;
            color: hsl(158, 36%, 37%);
        }
        .prices p:nth-child(2) {
            font-size: 14px;
            color:hsl(228, 12%, 48%);
            text-decoration: line-through;
        }
        .btn-addToCart {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            color:hsl(0, 0%, 100%);
            background:hsl(158, 36%, 37%);
            padding: 14px 0;
            border: none;
            border-radius: 8px;
            transition: 0.3s ease;
            cursor: pointer;
        }
        .btn-addToCart:hover {
            background: rgb(36, 79, 63);
        }
        .btn-addToCart svg {
            margin-right: 10px;
        }

        /* Credits */
        .attribution {
            display: none;
            position: absolute;
            bottom: 20px;
        }

        @media (min-width: 960px) {
            .container {
                height: 100vh;
            }
            .product-card-container {
                max-width: 650px;
                height: 450px;
                flex-direction: row;
            }
            .product-card-image img:nth-child(1) {
                display: none;
            }
            .product-card-image img:nth-child(2) {
                display: block;
            }
            .product-content {
                width: 85%;
                padding: 40px 40px;
            }
            .product-title {
                padding: 0 30px 0 0;
            }
            .attribution {
                display: flex;
                justify-content: center;
                position: absolute;
                bottom: 20px;
            }
            .attribution a {
                margin-left: 6px;
                font-weight: bold;
            }
            .attribution a:visited {
                color: hsl(158, 36%, 37%);
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="container">
            <div class="product-card-container">
                <div class="product-card-image">
                    <img src="./images/image-product-mobile.jpg" alt="Imagen de un Perfume CHANEL">
                    <img src="./images/image-product-desktop.jpg" alt="Imagen de un Perfume CHANEL">
                </div>
                <div class="product-content">
                    <p class="product-name">Perfume</p>
                    <h2 class="product-title">Gabrielle Essence Eau De Parfum</h2>
                    <p class="product-description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
                        Perfumer-Creator for the House of CHANEL.
                    </p>
                    <div class="prices">
                        <p>$149.99</p>
                        <p>$169.99</p>
                    </div>
                    <button class="btn-addToCart">
                        <svg width="15" height="16" xmlns="http://www.w3.org/2000/svg"><path d="M14.383 10.388a2.397 2.397 0 0 0-1.518-2.222l1.494-5.593a.8.8 0 0 0-.144-.695.8.8 0 0 0-.631-.28H2.637L2.373.591A.8.8 0 0 0 1.598 0H0v1.598h.983l1.982 7.4a.8.8 0 0 0 .799.59h8.222a.8.8 0 0 1 0 1.599H1.598a.8.8 0 1 0 0 1.598h.943a2.397 2.397 0 1 0 4.507 0h1.885a2.397 2.397 0 1 0 4.331-.376 2.397 2.397 0 0 0 1.12-2.021ZM11.26 7.99H4.395L3.068 3.196h9.477L11.26 7.991Zm-6.465 6.392a.8.8 0 1 1 0-1.598.8.8 0 0 1 0 1.598Zm6.393 0a.8.8 0 1 1 0-1.598.8.8 0 0 1 0 1.598Z" fill="#FFF"/></svg>
                        Add to Cart
                    </button>
                </div>
            </div>
            <div class="attribution">
                Challenge by <a href="https://www.frontendmentor.io/profile/manuelscl" target="_blank">Frontend Mentor</a>. 
                Coded by<a href="https://github.com/manuelscl/product-preview-card" target="_blank">Manuelscl</a>.
            </div>
        </section>
    </main>
</body>
</html>
